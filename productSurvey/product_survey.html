<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT SURVEY</title>
</head>

<body>
    <h1>Welcome to Luxury Brand Products Feedback</h1>
    <form id="productFeedback">
        <fieldset>
            <legend>Provide Your Feedback</legend>
            </legend>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="userName" placeholder="Your Name" required><br>
            <label for="age">Age:</label><br>
            <input type="number" name="userAge" id="age" placeholder="Your Age" required><br>
            <label for="email">Email:</label><br>
            <input type="email" name="userEmail" id="email" placeholder="Your Email" required><br>
            <label for="job">Job:</label><br>
            <input type="text" name="userJob" id="job" placeholder="Your Job" required><br>
            <label for="designation">Designation:</label><br>
            <input type="text" name="userDesignation" id="designation" placeholder="Your Designation" required><br>
            <label for="productType">Product Type:</label><br>
            <input type="text" name="userProductChoice" list="productType" required>
            <datalist id="productType">
                <option value="perfume"></option>
                <option value="cream"></option>
                <option value="oils"></option>
            </datalist>

            <br>
            <label for="feedbackText">Feedback:</label><br>
            <textarea id="feedbackText" name="userFeedback" rows="5" cols="30" placeholder="Enter your feedback here"
                required></textarea><br>
            <button id="submitBtn" type="submit">Submit Feedback</button>
           
        </fieldset>
    </form>
     <hr>
            <div id="userInfo" style="display: none;" >
                <h2>User Information:</h2>
                <p>Name: <span id="userName"></span></p>
                <p>Age: <span id="userAge"></span></p>
                <p>Email: <span id="userEmail"></span></p>
                <p>Job: <span id="userJob"></span></p>
                <p>Designation: <span id="userDesignation"></span></p>
                <p>Feedback for <span id="userProductChoice"></span>: <span id="userFeedback"></span></p>
                </div>


    <script src="product_survey.js"></script>
</body>

</html>
